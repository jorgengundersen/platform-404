services:
  platform-404:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      OPENCODE_DB_PATH: /opencode/opencode.db
      DASHBOARD_DB_PATH: /data/dashboard.db
      SYNC_INTERVAL_MS: "30000"
    volumes:
      - devenv-data:/opencode:ro
      - platform-404-data:/data

volumes:
  devenv-data:
    external: true
  platform-404-data:
